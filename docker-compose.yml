services:
  ghost-browser:
    build: .
    image: ghost-chrome-runner
    # FORCE AMD64: Google Chrome only exists for x86_64 linux
    platform: linux/amd64
    container_name: ghost-browser
    ports:
      # Override host-side ports via env vars to avoid conflicts when multiple
      # ghost-browser instances run on the same host.
      # e.g.: GHOST_HOST_PORT=3001 docker compose up
      - "${GHOST_HOST_PORT:-3000}:3000"
      - "${CHROME_HOST_PORT:-9222}:9222"
    volumes:
      - chrome_data:/data/chrome-profile
    environment:
      - CHROME_ARGS=--window-size=1920,1080
      # Auto-shutdown after 300 seconds (5 mins) of inactivity
      # Set to 0 to disable
      - IDLE_TIMEOUT=0
    shm_size: '2gb'
    # Restart unless manually stopped
    restart: unless-stopped

volumes:
  chrome_data:
